<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>account book</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f2f2f7;
--card:#ffffff;
--blue:#007aff;
--red:#ff3b30;
--gray:#8e8e93;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
color:#111;
}

/* HEADER */
.header{
padding:18px;
text-align:center;
font-weight:600;
background:var(--card);
font-size:16px;
}

/* SUMMARY */
.summary{
display:flex;
justify-content:space-between;
margin:12px;
padding:14px;
background:var(--card);
border-radius:16px;
font-size:14px;
}

/* TABS */
.tabs{
display:flex;
margin:10px;
background:var(--card);
border-radius:16px;
overflow:hidden;
}

.tabs button{
flex:1;
padding:12px;
border:none;
background:transparent;
font-size:13px;
}

.tabs button.active{
background:#000;
color:#fff;
}

/* CARD */
.card{
margin:10px;
background:var(--card);
border-radius:16px;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

/* ITEM */
.item{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.small{
font-size:11px;
color:var(--gray);
}

/* CALENDAR */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
margin:10px;
background:var(--card);
border-radius:16px;
overflow:hidden;
}

.day{
min-height:58px;
border:1px solid #eee;
font-size:11px;
padding:4px;
}

.in{color:var(--blue);}
.out{color:var(--red);}

/* FAB */
.fab{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:13px 22px;
border-radius:999px;
border:none;
font-size:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* POPUP */
.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
background:var(--card);
padding:16px;
border-radius:18px 18px 0 0;
display:none;
box-shadow:0 -10px 30px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #e5e5ea;
font-size:14px;
outline:none;
}

canvas{
max-width:100%;
}
</style>
</head>

<body>

<div class="header">account book</div>

<div class="summary">
<div>수입 <b style="color:var(--blue)" id="income">0</b></div>
<div>지출 <b style="color:var(--red)" id="expense">0</b></div>
</div>

<div class="tabs">
<button onclick="tab('home')" class="active">기록</button>
<button onclick="tab('cal')">달력</button>
<button onclick="tab('stats')">통계</button>
<button onclick="tab('set')">설정</button>
</div>

<!-- HOME -->
<div id="home">
<div class="card" id="list"></div>
</div>

<!-- CALENDAR -->
<div id="cal" style="display:none">
<div class="card" id="monthTitle"></div>
<div class="calendar" id="calendar"></div>
</div>

<!-- STATS -->
<div id="stats" style="display:none">
<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

<!-- SETTINGS -->
<div id="set" style="display:none">
<div class="card">
<button onclick="exportData()">백업</button>
<input type="file" onchange="importData(event)">
</div>
</div>

<button class="fab" onclick="openPopup()">+ 추가</button>

<!-- POPUP -->
<div class="popup" id="popup">

<input type="date" id="date">
<input type="number" id="amount">

<select id="type">
<option>수입</option>
<option>지출</option>
</select>

<input id="category" placeholder="카테고리">
<input id="method" placeholder="지출방식">
<input id="memo" placeholder="메모">

<button onclick="add()">저장</button>
<button onclick="closePopup()">닫기</button>

</div>

<script src="app.js"></script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
