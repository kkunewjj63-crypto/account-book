<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>account book</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system;
background:#f2f2f7;
}

.header{
text-align:center;
padding:16px;
background:#fff;
font-weight:600;
position:sticky;
top:0;
z-index:10;
}

.card{
margin:12px;
padding:16px;
background:#fff;
border-radius:20px;
}

.row{
display:flex;
gap:8px;
}

.row > *{
flex:1;
min-width:0;
}

button,input,select{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#f2f2f7;
font-size:14px;
}

button{
background:#007aff;
color:#fff;
}

.tabs{
display:flex;
margin:10px;
background:#fff;
border-radius:14px;
overflow:hidden;
}

.tabs button{
flex:1;
background:transparent;
color:#000;
}

.tabs .active{
background:#000;
color:#fff;
}

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
padding:16px;
border-radius:20px 20px 0 0;
display:none;
z-index:999;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:56px;
height:56px;
border-radius:50%;
font-size:22px;
}
</style>
</head>

<body>

<div class="header">account book</div>

<div class="card row">
<button onclick="switchUser('personal')">👤 개인</button>
<button onclick="switchUser('family')">🏠 가족</button>
</div>

<div class="tabs">
<button class="active" onclick="tab('home',this)">기록</button>
<button onclick="tab('stats',this)">통계</button>
<button onclick="tab('set',this)">설정</button>
</div>

<div id="view"></div>

<button class="fab" onclick="openPopup()">＋</button>
<div class="popup" id="popup"></div>

<script src="app.js"></script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
